        <div class="col-lg-12 col-xl-12">
          <div class="card">
            <div class="card-body">
              <div class="text-center">Add Product</div>
              <hr />
              <form action="" method="post" id="productForm">
                {% csrf_token %}
                <div>
                  <label for=""
                    >Product Title <span class="text-danger">*</span></label
                  >
                  <input
                    type="text"
                    class="form-control"
                    name="title"
                    required
                  />
                </div>
                <hr />
                <div class="row">
                  <div class="mx-2">
                    <label for=""
                      >Select Sub Category
                      <span class="text-danger">*</span></label
                    >
                    <select
                      name="subcategory"
                      id=""
                      class="form-control"
                      required
                    >
                      <option value="">--select--</option>
                      {% for c in sub_category %}
                      <option value="{{c.uid}}">{{c.category_name}}</option>
                      {% endfor %}
                    </select>
                    <!-- <input type="text" class="form-control" name="subcategory"> -->
                  </div>
                  <div class="mx-2">
                    <label for=""
                      >Select Brands <span class="text-danger">*</span></label
                    >
                    <select name="brands" id="" class="form-control" required>
                      <option value="">--select--</option>
                      {% for c in brands %}
                      <option value="{{c.uid}}">{{c.brands_name}}</option>
                      {% endfor %}
                    </select>
                    <!-- <input type="text" class="form-control" name="subcategory"> -->
                  </div>
                  <div class="mx-2">
                    <label for=""
                      >Mrp Price <span class="text-danger">*</span></label
                    >
                    <input
                      type="number"
                      class="form-control"
                      name="mrp_price"
                      min="0"
                      step="0.01"
                      required
                    />
                  </div>
                  <div class="mx-2">
                    <label for=""
                      >Discounted Price
                      <span class="text-danger">*</span></label
                    >
                    <input
                      type="number"
                      class="form-control"
                      name="dis_price"
                      min="0"
                      step="0.01"
                      required
                    />
                  </div>
                </div>
                <hr />
                <div class="row">
                  <div class="mx-2">
                    <label for=""
                      >Length (cm) <span class="text-danger">*</span></label
                    >
                    <input
                      type="number"
                      class="form-control"
                      name="length"
                      min="0"
                      step="0.01"
                      required
                    />
                  </div>
                  <div class="mx-2">
                    <label for=""
                      >Breadth (cm) <span class="text-danger">*</span></label
                    >
                    <input
                      type="number"
                      class="form-control"
                      name="breadth"
                      min="0"
                      step="0.01"
                      required
                    />
                  </div>
                  <div class="mx-2">
                    <label for=""
                      >Height (cm) <span class="text-danger">*</span></label
                    >
                    <input
                      type="number"
                      class="form-control"
                      name="height"
                      min="0"
                      step="0.01"
                      required
                    />
                  </div>
                  <div class="mx-2">
                    <label for=""
                      >Weight (gram) <span class="text-danger">*</span></label
                    >
                    <input
                      type="number"
                      class="form-control"
                      name="weight"
                      min="0"
                      step="0.01"
                      required
                    />
                  </div>
                </div>
                <hr />

                <div>
                  <label for=""
                    >Descriptions <span class="text-danger">*</span></label
                  >
                  <textarea
                    class="w-100"
                    name="desc"
                    id="editor"
                    cols="30"
                    rows="5"
                    required
                  ></textarea>
                </div>
                <hr />

                <div
                  class="d-flex justify-content-center align-item-center w-100 my-1"
                >
                  <button type="submit" class="btn btn-dark mb-2">
                    Submit
                  </button>
                </div>
              </form>
              <script>
                document
                  .getElementById("productForm")
                  .addEventListener("submit", function (e) {
                    const title = document
                      .querySelector('input[name="title"]')
                      .value.trim();
                    const subcategory = document.querySelector(
                      'select[name="subcategory"]',
                    ).value;
                    const brands = document.querySelector(
                      'select[name="brands"]',
                    ).value;
                    const mrp_price = document
                      .querySelector('input[name="mrp_price"]')
                      .value.trim();
                    const dis_price = document
                      .querySelector('input[name="dis_price"]')
                      .value.trim();
                    const length = document
                      .querySelector('input[name="length"]')
                      .value.trim();
                    const breadth = document
                      .querySelector('input[name="breadth"]')
                      .value.trim();
                    const height = document
                      .querySelector('input[name="height"]')
                      .value.trim();
                    const weight = document
                      .querySelector('input[name="weight"]')
                      .value.trim();
                    const desc = document
                      .querySelector('textarea[name="desc"]')
                      .value.trim();

                    if (!title) {
                      e.preventDefault();
                      toastr.error("Please enter product title");
                      return false;
                    }
                    if (!subcategory) {
                      e.preventDefault();
                      toastr.error("Please select a subcategory");
                      return false;
                    }
                    if (!brands) {
                      e.preventDefault();
                      toastr.error("Please select a brand");
                      return false;
                    }
                    if (!mrp_price || mrp_price <= 0) {
                      e.preventDefault();
                      toastr.error("Please enter valid MRP price");
                      return false;
                    }
                    if (!dis_price || dis_price <= 0) {
                      e.preventDefault();
                      toastr.error("Please enter valid discounted price");
                      return false;
                    }
                    if (!length || length <= 0) {
                      e.preventDefault();
                      toastr.error("Please enter valid length");
                      return false;
                    }
                    if (!breadth || breadth <= 0) {
                      e.preventDefault();
                      toastr.error("Please enter valid breadth");
                      return false;
                    }
                    if (!height || height <= 0) {
                      e.preventDefault();
                      toastr.error("Please enter valid height");
                      return false;
                    }
                    if (!weight || weight <= 0) {
                      e.preventDefault();
                      toastr.error("Please enter valid weight");
                      return false;
                    }
                    if (!desc) {
                      e.preventDefault();
                      toastr.error("Please enter product description");
                      return false;
                    }
                  });
              </script>
            </div>
          </div>
        </div>
      </div>
    </div>

</div>
{% endblock body %}
