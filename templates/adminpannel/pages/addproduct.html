{% extends 'adminpannel/base.html' %} {% block body %} {% include
'adminpannel/loader.html' %}
<div id="main-wrapper">
  <!-- header -->
  {% include 'adminpannel/header.html' %}
  <!-- #/ header -->
  <!-- sidebar -->
  {% include 'adminpannel/sidebar.html' %}
  <!-- #/ sidebar -->
  <div class="content-body">
    <div class="container">
      <div class="row">
        <div class="col-lg-12 col-xl-12">
          <div class="card">
            <div class="card-body">
              <div class="text-center">Add Product</div>
              <hr />
              <form
                action="{% url 'addproduct' %}"
                method="post"
                id="productForm"
                onsubmit="captureEditorContent(event)"
              >
                {% csrf_token %}
                <div>
                  <label for=""
                    >Product Title <span class="text-danger">*</span></label
                  >
                  <input
                    type="text"
                    class="form-control"
                    name="title"
                    required
                  />
                </div>
                <hr />
                <div class="row">
                  <div class="mx-2">
                    <label for=""
                      >Select Sub Category
                      <span class="text-danger">*</span></label
                    >
                    <select name="subcategory" class="form-control" required>
                      <option value="">--select--</option>
                      {% for c in sub_category %}
                      <option value="{{c.uid}}">{{c.category_name}}</option>
                      {% endfor %}
                    </select>
                  </div>
                  <div class="mx-2">
                    <label for=""
                      >Select Brands <span class="text-danger">*</span></label
                    >
                    <select name="brands" class="form-control" required>
                      <option value="">--select--</option>
                      {% for c in brands %}
                      <option value="{{c.uid}}">{{c.brands_name}}</option>
                      {% endfor %}
                    </select>
                  </div>
                  <div class="mx-2">
                    <label for=""
                      >Mrp Price <span class="text-danger">*</span></label
                    >
                    <input
                      type="number"
                      class="form-control"
                      name="mrp_price"
                      min="0"
                      max="2147483647"
                      step="0.01"
                      required
                    />
                  </div>
                  <div class="mx-2">
                    <label for=""
                      >Discounted Price
                      <span class="text-danger">*</span></label
                    >
                    <input
                      type="number"
                      class="form-control"
                      name="dis_price"
                      min="0"
                      max="2147483647"
                      step="0.01"
                      required
                    />
                  </div>
                </div>
                <hr />
                <div class="row">
                  <div class="mx-2">
                    <label for=""
                      >Length (cm) <span class="text-danger">*</span></label
                    >
                    <input
                      type="number"
                      class="form-control"
                      name="length"
                      min="0"
                      max="2147483647"
                      step="0.01"
                      required
                    />
                  </div>
                  <div class="mx-2">
                    <label for=""
                      >Breadth (cm) <span class="text-danger">*</span></label
                    >
                    <input
                      type="number"
                      class="form-control"
                      name="breadth"
                      min="0"
                      max="2147483647"
                      step="0.01"
                      required
                    />
                  </div>
                  <div class="mx-2">
                    <label for=""
                      >Height (cm) <span class="text-danger">*</span></label
                    >
                    <input
                      type="number"
                      class="form-control"
                      name="height"
                      min="0"
                      max="2147483647"
                      step="0.01"
                      required
                    />
                  </div>
                  <div class="mx-2">
                    <label for=""
                      >Weight (gram) <span class="text-danger">*</span></label
                    >
                    <input
                      type="number"
                      class="form-control"
                      name="weight"
                      min="0"
                      max="99999.99"
                      step="0.01"
                      required
                    />
                  </div>
                </div>
                <hr />

                <div>
                  <label for=""
                    >Descriptions <span class="text-danger">*</span></label
                  >
                  <textarea
                    class="w-100"
                    name="desc"
                    id="editor"
                    cols="30"
                    rows="5"
                  ></textarea>
                </div>
                <hr />

                <div
                  class="d-flex justify-content-center align-item-center w-100 my-1"
                >
                  <button type="submit" class="btn btn-dark mb-2">
                    Submit
                  </button>
                </div>
              </form>

              <script>
                // Form submission is handled by captureEditorContent() in base.html
                // which logs all form data to console before sending
              </script>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  {% include 'adminpannel/copywrite.html' %}
</div>
{% endblock body %}
