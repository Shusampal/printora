{% extends 'adminpannel/base.html' %} {% load static %} {% block body %} {%
include 'adminpannel/loader.html' %}

<div id="main-wrapper">
  {% include 'adminpannel/header.html' %} {% include 'adminpannel/sidebar.html'
  %}

  <div class="content-body">
    <div class="container">
      <div class="row">
        <div class="col-lg-12 col-xl-12">
          <div class="card">
            <div class="card-body">
              <div class="text-center"><h4>Add Product</h4></div>
              <hr />

              <form
                action="{% url 'addproduct' %}"
                method="POST"
                id="productForm"
              >
                {% csrf_token %}

                <!-- Product Title -->
                <div>
                  <label>Product Title *</label>
                  <input
                    type="text"
                    class="form-control"
                    name="title"
                    required
                  />
                </div>

                <hr />

                <!-- Category + Brand + Price -->
                <div class="row">
                  <div class="col-md-3">
                    <label>Sub Category *</label>
                    <select name="subcategory" class="form-control" required>
                      <option value="">--select--</option>
                      {% for c in sub_category %}
                      <option value="{{c.uid}}">{{c.category_name}}</option>
                      {% endfor %}
                    </select>
                  </div>

                  <div class="col-md-3">
                    <label>Brand *</label>
                    <select name="brands" class="form-control" required>
                      <option value="">--select--</option>
                      {% for c in brands %}
                      <option value="{{c.uid}}">{{c.brands_name}}</option>
                      {% endfor %}
                    </select>
                  </div>

                  <div class="col-md-3">
                    <label>MRP Price *</label>
                    <input
                      type="number"
                      name="mrp_price"
                      class="form-control"
                      required
                    />
                  </div>

                  <div class="col-md-3">
                    <label>Discounted Price *</label>
                    <input
                      type="number"
                      name="dis_price"
                      class="form-control"
                      required
                    />
                  </div>
                </div>

                <hr />

                <!-- Dimensions -->
                <div class="row">
                  <div class="col-md-3">
                    <label>Length (cm) *</label>
                    <input
                      type="number"
                      name="length"
                      class="form-control"
                      required
                    />
                  </div>

                  <div class="col-md-3">
                    <label>Breadth (cm) *</label>
                    <input
                      type="number"
                      name="breadth"
                      class="form-control"
                      required
                    />
                  </div>

                  <div class="col-md-3">
                    <label>Height (cm) *</label>
                    <input
                      type="number"
                      name="height"
                      class="form-control"
                      required
                    />
                  </div>

                  <div class="col-md-3">
                    <label>Weight (gram) *</label>
                    <input
                      type="number"
                      name="weight"
                      class="form-control"
                      required
                    />
                  </div>
                </div>

                <hr />

                <!-- Description -->
                <div>
                  <label>Description *</label>
                  <textarea
                    name="desc"
                    id="editor"
                    class="form-control"
                    rows="5"
                    required
                  ></textarea>
                </div>

                <hr />

                <div class="text-center">
                  <button type="submit" class="btn btn-dark">Submit</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  {% include 'adminpannel/copywrite.html' %}
</div>

<!-- ✅ CKEditor (safe setup) -->
<script src="https://cdn.ckeditor.com/4.22.1/standard/ckeditor.js"></script>

<script>
  // Initialize editor safely
  let editorInstance = null;

  if (document.getElementById("editor")) {
    editorInstance = CKEDITOR.replace("editor");
  }

  // Safe form submit (NO crash)
  document
    .getElementById("productForm")
    .addEventListener("submit", function () {
      if (editorInstance) {
        document.querySelector('textarea[name="desc"]').value =
          editorInstance.getData();
      }
    });
</script>

{% endblock %}
